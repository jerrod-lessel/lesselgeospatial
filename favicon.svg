<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: dark rounded square (for favicon.svg / apple-touch-icon) -->
  <rect width="64" height="64" rx="12" fill="#080808"/>

  <!-- Graticule arc — longitude arcs (vertical curves) -->
  <!-- Faintest outer longitude -->
  <path d="M48 10 A24 24 0 0 1 58 44" stroke="#2a2a2a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Mid longitude -->
  <path d="M40 7.5 A24 24 0 0 1 58 36" stroke="#383838" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Graticule arc — latitude arcs (horizontal curves) -->
  <!-- Faintest outer latitude -->
  <path d="M30 24 Q44 23 54 28" stroke="#2a2a2a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Mid latitude -->
  <path d="M30 16 Q44 15 54 20" stroke="#383838" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Primary bold arc — the hero outer quarter-circle -->
  <path d="M30 6 A24 24 0 0 1 58 30" stroke="#e8e8e8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Dashed axis lines extending from origin -->
  <line x1="30" y1="6" x2="30" y2="30" stroke="#404040" stroke-width="1" stroke-dasharray="2.5 2"/>
  <line x1="30" y1="30" x2="58" y2="30" stroke="#404040" stroke-width="1" stroke-dasharray="2.5 2"/>

  <!-- Origin dot -->
  <circle cx="30" cy="30" r="3.5" fill="#e8e8e8"/>

  <!-- Axis terminus dots -->
  <circle cx="30" cy="6" r="2" fill="#777"/>
  <circle cx="58" cy="30" r="2" fill="#777"/>
</svg>
